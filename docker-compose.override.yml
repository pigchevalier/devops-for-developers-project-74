services:
  app:
    build:
      dockerfile: Dockerfile
    ports:
       - "8080:8080"
    command: make dev
    volumes:
      - "./app:/app"
  caddy:
    depends_on:
      - app
    image: caddy:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./services/caddy:/etc/caddy"
